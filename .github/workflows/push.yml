name: Push - Fingerprint → OTA or Build

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  deploy:
    name: Deploy (Fingerprint → OTA or Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@main
        with:
          eas-version: latest
          eas-cache: false
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Deploy (fingerprint check → build if needed → OTA)
        uses: expo/expo-github-action/continuous-deploy-fingerprint@main
        with:
          profile: preview
          branch: preview
          platform: android
          environment: preview
