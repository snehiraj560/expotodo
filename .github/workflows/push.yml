name: Push - Fingerprint → OTA or Build

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TODO_2MAR }}
  CI: 1

jobs:
  deploy:
    name: Deploy (Fingerprint → OTA or Build)
    runs-on: ubuntu-latest
    steps:
      - name: Check EXPO_TOKEN
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN secret is not set. Add it at https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "EXPO_TOKEN is set"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@main
        with:
          eas-version: latest
          eas-cache: false
          packager: npm
          token: ${{ secrets.EXPO_TODO_2MAR }}

      - name: Deploy (fingerprint check → build if needed → OTA)
        uses: expo/expo-github-action/continuous-deploy-fingerprint@main
        with:
          profile: development
          branch: development
          platform: android
          environment: development
