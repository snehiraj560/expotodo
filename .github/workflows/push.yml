name: Push - Test & Deploy (OTA)

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TODO_2MAR }}
  CI: 1

jobs:
  deploy:
    name: Deploy (OTA)
    runs-on: ubuntu-latest
    steps:
      - name: Check EXPO_TOKEN
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN secret is not set. Add it at https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "EXPO_TOKEN is set"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@main
        with:
          eas-version: latest
          eas-cache: false
          packager: npm
          token: ${{ secrets.EXPO_TODO_2MAR }}

      - name: Verify project access
        run: eas project:info

      - name: Publish EAS Update (OTA)
        env:
          CI: 1
        run: eas update --branch development --environment development --message "Deploy from CI (${{ github.sha }})"
