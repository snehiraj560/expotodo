name: Push - Test & Deploy (OTA)

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  deploy:
    name: Deploy (OTA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@main
        with:
          eas-version: latest
          eas-cache: false
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify project access
        run: eas project:info

      - name: Publish EAS Update (OTA)
        run: eas update --branch preview --environment preview --message "Deploy from CI (${{ github.sha }})" --non-interactive
